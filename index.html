<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#101a42" />
  <title>王城じゃんけん決闘</title>
  <style>
    :root { --paper:#f8f2df; --ink:#1c1e36; --navy:#101a42; --blue:#263b80; --gold:#ffc94f; --red:#e85c62; --mist:#d9e7ff; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; overflow-x:hidden; color:var(--paper); font-family:"Hiragino Maru Gothic ProN","Noto Sans JP",system-ui,sans-serif; background:linear-gradient(#2c3f8e 0,#111b4b 46%,#080b24 100%); }
    body::before { content:""; position:fixed; inset:0; pointer-events:none; opacity:.72; background:radial-gradient(circle at 13% 16%,#fff 0 1px,transparent 2px),radial-gradient(circle at 24% 34%,#fff 0 1px,transparent 2px),radial-gradient(circle at 47% 9%,#fff 0 2px,transparent 3px),radial-gradient(circle at 75% 27%,#fff 0 1px,transparent 2px),radial-gradient(circle at 91% 13%,#fff 0 1px,transparent 2px); background-size:180px 150px,230px 190px,260px 220px,200px 170px,280px 210px; }
    .moon { position:fixed; right:7vw; top:7vh; width:min(20vw,150px); aspect-ratio:1; border-radius:50%; background:#fff4c4; box-shadow:0 0 0 13px #fff4c41d,0 0 60px #fff4c488; }
    .castle { position:fixed; z-index:-1; left:50%; bottom:0; width:min(1000px,120vw); height:48vh; transform:translateX(-50%); background:linear-gradient(90deg,transparent 0 7%,#080d2b 7% 16%,transparent 16% 21%,#080d2b 21% 34%,transparent 34% 40%,#080d2b 40% 60%,transparent 60% 67%,#080d2b 67% 80%,transparent 80% 86%,#080d2b 86% 94%,transparent 94%); clip-path:polygon(0 100%,0 82%,8% 82%,8% 63%,11% 52%,14% 63%,14% 82%,23% 82%,23% 40%,28% 20%,33% 40%,33% 82%,41% 82%,41% 28%,50% 0,59% 28%,59% 82%,68% 82%,68% 48%,73% 27%,78% 48%,78% 82%,87% 82%,87% 62%,90% 49%,93% 62%,93% 82%,100% 82%,100% 100%); filter:drop-shadow(0 -8px 26px #090d2a); }
    main { width:min(780px,calc(100% - 28px)); margin:auto; padding:28px 0 44px; position:relative; }
    header { display:flex; justify-content:space-between; align-items:center; gap:14px; margin-bottom:18px; } .brand small { display:block; color:#d8dfff; letter-spacing:.14em; font-weight:800; } h1 { margin:3px 0 0; font-family:Georgia,"Hiragino Mincho ProN",serif; font-size:clamp(1.8rem,7vw,3rem); letter-spacing:.08em; text-shadow:0 3px 0 #11153a; }
    .streak { padding:9px 13px; border:1px solid #ffffff42; border-radius:999px; background:#101a42b8; color:#fff3b6; font-weight:800; white-space:nowrap; }
    .game { border:2px solid #ffdd7a99; border-radius:28px; overflow:hidden; background:#101a42de; box-shadow:0 24px 70px #030518aa; backdrop-filter:blur(8px); }
    .scoreboard { display:grid; grid-template-columns:1fr 1.15fr 1fr; text-align:center; background:#f8f2df; color:var(--ink); } .score { padding:13px 4px; font-size:.75rem; font-weight:800; } .score strong { display:block; font-size:1.65rem; line-height:1.1; } .score.player { color:#2058a7; } .score.cpu { color:#b53645; } .score.draw { border-inline:1px dashed #9a947f; color:#6e654e; }
    .arena { padding:22px clamp(12px,4vw,34px) 24px; } .round { min-height:1.7em; margin:0 0 10px; color:#d8e6ff; text-align:center; font-size:.9rem; font-weight:800; letter-spacing:.08em; }
    .fighters { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:14px; text-align:center; } .fighter { display:grid; justify-items:center; gap:6px; } .badge { display:inline-flex; align-items:center; gap:6px; padding:4px 9px; border-radius:999px; background:#ffffff1c; font-size:.73rem; } .hand { height:clamp(105px,24vw,155px); display:grid; place-items:center; font-size:clamp(5rem,17vw,8rem); line-height:1; filter:drop-shadow(0 10px 8px #0008); } .cpu-hand { transform:scaleX(-1); } .versus { font-family:Georgia,serif; color:var(--gold); font-size:1.4rem; font-style:italic; text-shadow:0 2px 0 #563c08; }
    #message { min-height:2.3em; margin:14px 0 18px; display:grid; place-items:center; text-align:center; font-size:clamp(1.1rem,4vw,1.45rem); font-weight:900; } .victory { color:#ffe680; } .defeat { color:#ffb3bb; } .tie { color:#bce4ff; }
    .choices { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; } .choice { position:relative; border:1px solid #ffffff45; border-radius:18px; padding:12px 6px; color:var(--paper); background:linear-gradient(180deg,#4157a0,#18265c); font:inherit; cursor:pointer; transition:transform .16s,filter .16s; } .choice:hover,.choice:focus-visible { transform:translateY(-5px); filter:brightness(1.18); outline:2px solid var(--gold); outline-offset:2px; } .choice:active { transform:translateY(0) scale(.96); } .choice span:first-child { display:block; font-size:2.35rem; line-height:1; } .choice span:last-child { display:block; margin-top:5px; font-size:.83rem; font-weight:800; }
    .footer { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top:14px; color:#d8e6ff; font-size:.76rem; } .reset { border:0; border-bottom:1px solid #d8e6ff; padding:2px 0; color:#d8e6ff; background:transparent; font:inherit; cursor:pointer; }
    .shake { animation:shake .26s ease-in-out 2; } @keyframes shake { 25% { transform:translateX(-9px) rotate(-8deg); } 75% { transform:translateX(9px) rotate(8deg); } }
    @media(max-width:480px) { header { align-items:flex-start; flex-direction:column; } .streak { align-self:flex-end; margin-top:-52px; } .arena { padding-inline:13px; } .fighters { gap:5px; } .score strong { font-size:1.35rem; } }
  </style>
</head>
<body>
  <div class="moon" aria-hidden="true"></div><div class="castle" aria-hidden="true"></div>
  <main>
    <header><div class="brand"><small>ROYAL DUEL • JANKEN</small><h1>王城じゃんけん決闘</h1></div><div class="streak">🔥 連勝 <span id="streak">0</span></div></header>
    <section class="game" aria-label="じゃんけんゲーム">
      <div class="scoreboard"><div class="score player">あなた<strong id="wins">0</strong></div><div class="score draw">あいこ<strong id="draws">0</strong></div><div class="score cpu">城の番人<strong id="losses">0</strong></div></div>
      <div class="arena">
        <p class="round" id="round">第一の勝負</p>
        <div class="fighters"><div class="fighter"><span class="badge">⚔️ あなた</span><div class="hand" id="playerHand">✊</div></div><div class="versus">VS</div><div class="fighter"><span class="badge">👑 城の番人</span><div class="hand cpu-hand" id="cpuHand">✊</div></div></div>
        <div id="message" aria-live="polite">武器を選んで決闘開始！</div>
        <div class="choices"><button class="choice" data-hand="rock" aria-label="グーを出す"><span>✊</span><span>グー</span></button><button class="choice" data-hand="scissors" aria-label="チョキを出す"><span>✌️</span><span>チョキ</span></button><button class="choice" data-hand="paper" aria-label="パーを出す"><span>✋</span><span>パー</span></button></div>
        <div class="footer"><span>勝利で連勝を重ねよう</span><button class="reset" id="reset">戦績をリセット</button></div>
      </div>
    </section>
  </main>
  <script>
    const hands={rock:'✊',scissors:'✌️',paper:'✋'},keys=Object.keys(hands),saved=JSON.parse(localStorage.getItem('royal-janken'));
    let score=saved||{wins:0,draws:0,losses:0,streak:0,round:1};
    const el=id=>document.getElementById(id);
    function paint(){['wins','draws','losses','streak'].forEach(k=>el(k).textContent=score[k]);el('round').textContent=`第${score.round}の勝負`;localStorage.setItem('royal-janken',JSON.stringify(score));}
    function play(player){const cpu=keys[Math.floor(Math.random()*3)],p=el('playerHand'),c=el('cpuHand'),m=el('message');p.textContent=hands[player];c.textContent=hands[cpu];[p,c].forEach(x=>{x.classList.remove('shake');void x.offsetWidth;x.classList.add('shake');});m.className='';if(player===cpu){score.draws++;m.textContent='互角！ もう一度、勝負！';m.classList.add('tie');}else if((player==='rock'&&cpu==='scissors')||(player==='scissors'&&cpu==='paper')||(player==='paper'&&cpu==='rock')){score.wins++;score.streak++;m.textContent='勝利！ 城の番人を退けた！';m.classList.add('victory');}else{score.losses++;score.streak=0;m.textContent='惜敗… 次の決闘に備えよう';m.classList.add('defeat');}score.round++;paint();}
    document.querySelectorAll('[data-hand]').forEach(b=>b.addEventListener('click',()=>play(b.dataset.hand)));el('reset').addEventListener('click',()=>{score={wins:0,draws:0,losses:0,streak:0,round:1};el('message').textContent='戦績をリセットしました';el('message').className='';paint();});paint();
  </script>
</body>
</html>
